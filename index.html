<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
}

.container{
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.timer{
  margin-top:10px;
  font-weight:bold;
  color:#ffd700;
  white-space:pre-line;
}

.success{ color:#00ff9f; }

.table-wrapper{
  position:relative;
  width:300px;
  height:188px;
  margin:40px auto 20px auto;
}

.table{
  width:100%;
  height:100%;
  border-radius:50%/50%;
  background:radial-gradient(circle, #0a5f2f, #004d26);
  border:3px solid #45a29e;
  box-shadow:0 0 20px rgba(0,255,159,0.2);
  animation:tablePulse 4s infinite ease-in-out;
}

@keyframes tablePulse{
  0%{ box-shadow:0 0 10px rgba(0,255,159,0.2);}
  50%{ box-shadow:0 0 25px rgba(0,255,159,0.4);}
  100%{ box-shadow:0 0 10px rgba(0,255,159,0.2);}
}

.card{
  position:absolute;
  width:32px;
  height:46px;
  background:white;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  transform:translate(-50%,-50%) rotateY(90deg);
  transition:0.6s;
  box-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.player-name{
  position:absolute;
  font-size:0.65rem;
  transform:translate(-50%,-50%);
  white-space:nowrap;
}

.chip{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  box-shadow:0 0 4px black;
}

@media(max-width:600px){
  .table-wrapper{
    transform:scale(0.75);
    transform-origin:top center;
  }
}
</style>
</head>

<body>
<div class="container">
<h1 id="title">MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<script>
const app=document.getElementById('app');
const urlParams=new URLSearchParams(window.location.search);
const agentName=urlParams.get('agent')||'Agent';

const codenames={
  "Arunan":"Alpha","Jason":"Viper","Gill":"Architect",
  "Prathap":"Midnight","Taylor":"Shadow","Duran":"Anomaly","Josh":"Mirage"
};

const roles={
  "Arunan":"Best Man","Prathap":"Groomsman","Gill":"Groomsman",
  "Taylor":"Groomsman","Duran":"Groomsman","Josh":"Groomsman","Jason":"Groomsman"
};

const codename=codenames[agentName]||"Agent";
const role=roles[agentName]||"Groomsman";

function render(html){ app.innerHTML=html; }

// Sounds
const clickSound=new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
const successSound=new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
successSound.playbackRate=0.6;
successSound.volume=0.4;

function playClick(){ clickSound.currentTime=0; clickSound.play(); }
function playSuccess(){ successSound.currentTime=0; successSound.play(); }

// Easter egg
let clicks=0;
document.getElementById("title").onclick=()=>{
  clicks++;
  if(clicks===5) alert("Easter Egg Unlocked: Drinks on Arunan 🍸");
};

// Start
function start(){
  render(`<p>Agent ${agentName} – Codename: ${codename}</p>
  <button onclick="eventScreen()">Begin Mission</button>`);
}

// Poker Screen
function eventScreen(){
  const w=300,h=188,cx=w/2,cy=h/2;

  render(`
    <div id="missionScreen">
      <p style="color:#ffd700;">AGENTS ASSEMBLED AT COMMAND TABLE</p>
      <p>Awaiting final authorization…</p>

      <div class="table-wrapper" id="table">
        <div class="table"></div>
        <div id="centerText" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.75rem;color:#ffd700;">
          🤖 AUTOMATED DEALER ACTIVE<br>💰 MISSION STAKES: ALL IN
        </div>
      </div>

      <div class="timer" id="timer"></div>
      <button onclick="authorizeMission()">[ AUTHORIZE MISSION ]</button>
    </div>
  `);

  startTimer();
  buildTable();
  dealCards();
}

// Build players
function buildTable(){
  const w=300,h=188,cx=w/2,cy=h/2;
  const container=document.getElementById('table');
  const players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];

  players.forEach((p,i)=>{
    const angle=(i/players.length)*2*Math.PI-Math.PI/2;
    const px=cx+(w/2+30)*Math.cos(angle);
    const py=cy+(h/2+30)*Math.sin(angle);

    const name=document.createElement('div');
    name.className='player-name';
    name.innerText=p===agentName?`${p} (YOU)`:p;
    name.style.left=px+"px";
    name.style.top=py+"px";

    if(p===agentName){
      name.style.color="#00ff9f";
      name.style.textShadow="0 0 8px #00ff9f";
    }

    container.appendChild(name);

    for(let c=0;c<3;c++){
      const chip=document.createElement('div');
      chip.className='chip';
      chip.style.background=c%2===0?'#ff4d4d':'#ffd700';
      chip.style.left=(px+10)+'px';
      chip.style.top=(py- c*3 +10)+'px';
      container.appendChild(chip);
    }
  });
}

// Deal cards
function dealCards(){
  const container=document.getElementById('table');
  const w=300,h=188,cx=w/2,cy=h/2;
  const players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];
  const deck=["A♠","K♥","Q♣","J♦","10♠","9♥","8♠","7♦","6♣","5♦"];

  let delay=0;

  players.forEach((p,i)=>{
    const angle=(i/players.length)*2*Math.PI-Math.PI/2;
    const px=cx+(w/2)*Math.cos(angle);
    const py=cy+(h/2)*Math.sin(angle);

    for(let c=0;c<2;c++){
      const card=document.createElement('div');
      card.className='card';
      card.innerText=deck[(i+c)%deck.length];
      card.style.left=cx+"px";
      card.style.top=cy+"px";
      container.appendChild(card);

      setTimeout(()=>{
        card.style.left=(px+(c*10))+"px";
        card.style.top=py+"px";
        card.style.transform="translate(-50%,-50%) rotateY(0deg)";
        playClick();
      },delay);

      delay+=150;
    }
  });
}

// Timer
function startTimer(){
  const target=new Date('September 18, 2026 12:00:00').getTime();
  setInterval(()=>{
    const now=new Date().getTime();
    const diff=target-now;
    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m=Math.floor((diff%(1000*60*60))/(1000*60));
    const s=Math.floor((diff%(1000*60))/1000);

    document.getElementById('timer').innerText=
      `MISSION CLOCK ACTIVE\nT–${d}D ${h}H ${m}M ${s}S`;
  },1000);
}

// Authorize → Transition
function authorizeMission(){
  document.getElementById('centerText').innerHTML=
    `<div style="color:#00ff9f;">CLEARANCE VERIFIED ✓</div>`;
  playSuccess();

  setTimeout(()=>transitionToFinal(),1200);
}

// Transition
function transitionToFinal(){
  const screen=document.getElementById('missionScreen');
  screen.style.transition="opacity 0.8s";
  screen.style.opacity="0";

  setTimeout(()=>{
    screen.innerHTML=`<div id="type"></div><div id="statusBar"></div><div id="actions" style="display:none;">
    <button onclick="transmitSMS()">📡 Transmit</button>
    <button onclick="transmitEmail()">✉ Email</button>
    <button onclick="openForm()">📝 Backup</button>
    </div><div id="feedback"></div>`;
    screen.style.opacity="1";
    startTerminalSequence();
  },800);
}

// Terminal typing
function startTerminalSequence(){
  const lines=[
    "CLASSIFIED // LEVEL 7 CLEARANCE",
    `AGENT: ${agentName.toUpperCase()} // ${codename.toUpperCase()}`,
    "SAFE HOUSE:",
    "6233 Muirfield Dr SW",
    "Cedar Rapids, IA",
    "FINAL DIRECTIVE:",
    "Arrive prepared. Maintain discretion."
  ];

  let i=0;
  function type(){
    if(i>=lines.length){
      document.getElementById('actions').style.display='block';
      return;
    }
    let line=lines[i];
    let div=document.createElement('div');
    document.getElementById('type').appendChild(div);
    let j=0;
    let t=setInterval(()=>{
      div.textContent+=line[j++];
      if(j>=line.length){ clearInterval(t); i++; setTimeout(type,200); }
    },20);
  }
  type();
}

function simulateTransmission(cb){
  const f=document.getElementById('feedback');
  f.innerHTML="📡 TRANSMITTING...";
  setTimeout(()=>f.innerHTML+="<br>ENCRYPTING...",600);
  setTimeout(()=>f.innerHTML+="<br>VERIFIED ✓",1200);
  setTimeout(()=>{ if(cb)cb(); },1500);
}

function transmitSMS(){
  simulateTransmission(()=>{
    window.location.href=`sms:+14694262300?body=Agent ${agentName} staying`;
  });
}

function transmitEmail(){
  simulateTransmission(()=>{
    window.location.href=`mailto:arunansoundra@gmail.com`;
  });
}

start();
</script>
</body>
</html>
