<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groomsmen Mission HQ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: 'Courier New', monospace;
      color: #00ff9c;
      text-align: center;
    }

    /* Gun barrel animation container */
    #gunBarrel {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #000 60%, transparent 61%) repeat;
      background-size: 20px 20px;
      animation: rotateBarrel 5s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    @keyframes rotateBarrel {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .barrel-text {
      font-size: 70px;
      font-weight: bold;
      margin-bottom: 20px;
      animation: fadeIn 3s ease-in-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    #enterBtn {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background-color: #00ff9c;
      color: black;
      border: none;
      display: none;
      margin-top: 20px;
    }

    #terminal {
      display: none;
      padding-top: 50px;
    }
  </style>
</head>
<body>

<!-- Bond Theme Audio -->
<audio id="bondMusic" autoplay loop>
  <source src="bond-theme.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div id="gunBarrel">
  <div class="barrel-text">007</div>
  <div class="barrel-text" style="animation-delay: 1s;">Welcome to the Groomsmen Mission HQ</div>
  <button id="enterBtn" onclick="enterHQ()">ENTER</button>
</div>

<div id="terminal">
  <h2>Agent Portal</h2>
  <p>Select your mission briefing below:</p>
  <ul style="list-style:none; padding:0; font-size:20px;">
    <li><a href="bestman.html" style="color:#00ff9c;">Best Man: Jason</a></li>
    <li><a href="groomsman1.html" style="color:#00ff9c;">Agent Gill</a></li>
    <li><a href="groomsman2.html" style="color:#00ff9c;">Agent Prathap</a></li>
    <li><a href="groomsman3.html" style="color:#00ff9c;">Agent Taylor</a></li>
    <li><a href="groomsman4.html" style="color:#00ff9c;">Agent Duran</a></li>
    <li><a href="groomsman5.html" style="color:#00ff9c;">Agent Josh</a></li>
  </ul>
</div>

<script>
  // Fade-in text and show Enter button after animation
  window.onload = function() {
    setTimeout(function() {
      document.getElementById('enterBtn').style.display = 'inline-block';
    }, 4000); // matches fade-in delay
  }

  function enterHQ() {
    document.getElementById('gunBarrel').style.display = 'none';
    document.getElementById('terminal').style.display = 'block';
  }
</script>

</body>
</html>
