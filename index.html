<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groomsmen Mission HQ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Landing page animations */
    body {
      background-color: black;
      color: #00ff9c;
      font-family: 'Courier New', monospace;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #intro {
      position: relative;
      top: 25%;
      animation: fadeIn 3s ease-in-out;
    }

    .barrel {
      font-size: 80px;
      font-weight: bold;
      margin-top: 20px;
      animation: zoom 2s ease-in-out infinite alternate;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    button {
      background-color: #00ff9c;
      color: black;
      border: none;
      padding: 15px 30px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      font-size: 18px;
    }

    #terminal {
      display: none;
      padding-top: 50px;
    }
  </style>
</head>
<body>

<!-- Bond Theme Audio -->
<audio id="bondMusic" autoplay loop>
  <source src="bond-theme.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div id="intro">
  <div class="barrel">007</div>
  <h2>Welcome to the Groomsmen Mission HQ</h2>
  <button id="enter" onclick="enterHQ()">ENTER</button>
</div>

<div id="terminal">
  <h2>Agent Portal</h2>
  <p>Select your mission briefing below:</p>
  <ul style="list-style:none; padding:0; font-size:20px;">
    <li><a href="bestman.html" style="color:#00ff9c;">Best Man: Jason</a></li>
    <li><a href="groomsman1.html" style="color:#00ff9c;">Agent Gill</a></li>
    <li><a href="groomsman2.html" style="color:#00ff9c;">Agent Prathap</a></li>
    <li><a href="groomsman3.html" style="color:#00ff9c;">Agent Taylor</a></li>
    <li><a href="groomsman4.html" style="color:#00ff9c;">Agent Duran</a></li>
    <li><a href="groomsman5.html" style="color:#00ff9c;">Agent Josh</a></li>
  </ul>
</div>

<script>
function enterHQ() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('terminal').style.display = 'block';
}
</script>

</body>
</html>
