<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>

<meta name="theme-color" content="#0b0c10">

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
}

.container{
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:10px;
}

.screen{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.table-wrapper{
  position:relative;
  width:300px;
  height:188px;
  margin:30px auto;
}

.table{
  width:100%;
  height:100%;
  border-radius:50%/50%;
  background:radial-gradient(circle,#0a5f2f,#004d26);
  border:3px solid #45a29e;
}

.player-name{
  position:absolute;
  font-size:0.65rem;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<!-- ✅ Firebase v8 (FIXED) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const app=document.getElementById('app');
const agentName=new URLSearchParams(window.location.search).get('agent')||'Agent';

const codenames={
"Arunan":"Alpha","Jason":"Viper","Gill":"Architect",
"Prathap":"Midnight","Taylor":"Shadow","Duran":"Anomaly","Josh":"Mirage"
};

const roles={
"Arunan":"Best Man",
"Prathap":"Groomsman","Gill":"Groomsman",
"Taylor":"Groomsman","Duran":"Groomsman",
"Josh":"Groomsman","Jason":"Groomsman"
};

const codename=codenames[agentName]||"Agent";
const role=roles[agentName]||"Groomsman";

function render(html){
  app.innerHTML=`<div class="screen">${html}</div>`;
}

/* QUESTIONS */
const innerCircle=[
{level:1,q:"Where did it all begin?",options:["Cedar Rapids","Chicago","Omaha"],answer:"Cedar Rapids"},
{level:2,q:"Mission date?",options:["September 18, 2026","September 19, 2026"],answer:"September 18, 2026"},
{level:3,q:"Follow up event?",options:["Homecoming Celebration","After Party"],answer:"Homecoming Celebration"},
{level:4,q:"Lodging codename?",options:["Safe House","Base"],answer:"Safe House"},
{level:5,q:"Family is ____",options:["Forever","Strong"],answer:"Forever"}
];

let qIndex=0;

function start(){
render(`<p>Agent ${agentName} (${codename})</p>
<button onclick="startQ()">Begin Mission</button>`);
}

function startQ(){ showQ(); }

function showQ(){
const q=innerCircle[qIndex];
render(`<h3>LEVEL ${q.level}</h3><p>${q.q}</p>
${q.options.map(o=>`<button onclick="check('${o}')">${o}</button>`).join('')}
<div id="fb"></div>`);
}

function check(ans){
const q=innerCircle[qIndex];
if(ans===q.answer){
qIndex++;
if(qIndex<innerCircle.length) setTimeout(showQ,500);
else setTimeout(accessGranted,800);
}else{
document.getElementById('fb').innerText="Incorrect. Try again.";
}
}

/* GLITCH */
function accessGranted(){
render(`<h1 id="g">ACCESS GRANTED</h1>`);
let g=document.getElementById('g'),c=0;
let fx=setInterval(()=>{
g.style.opacity=Math.random();
g.style.transform=`translate(${Math.random()*5}px,${Math.random()*5}px)`;
if(++c>10){clearInterval(fx); terminal();}
},80);
}

/* TERMINAL */
function terminal(){
render(`
<h3>OPERATION: FOREVER</h3>
<p>${agentName} (${codename})</p>
<h2>${role}</h2>
<button onclick="accept()">🥃 Pour the whiskey</button>
<button onclick="accept()">🍸 Shaken, not stirred</button>
`);
}

/* POKER */
function accept(){
poker();
}

function poker(){
const players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];
render(`
<h3>MISSION START</h3>
<p>${agentName} (${codename}) - ${role}</p>
<h2>12:00 PM • September 18, 2026</h2>

<div class="table-wrapper" id="table"><div class="table"></div></div>

<button onclick="safe()">Proceed to Safe House</button>
`);

const table=document.getElementById('table');
const cx=150,cy=94;

players.forEach((p,i)=>{
let angle=i*(2*Math.PI/players.length);
let x=cx+120*Math.cos(angle);
let y=cy+70*Math.sin(angle);

let name=document.createElement('div');
name.className='player-name';
name.innerText=p===agentName?`${p} (YOU)`:p;
name.style.left=x+"px";
name.style.top=y+"px";

table.appendChild(name);
});
}

/* SAFE HOUSE */
function safe(){
render(`
<h3>SAFE HOUSE</h3>
<p>6233 Muirfield Dr SW<br>Cedar Rapids, IA</p>

<button onclick="confirm(true)">Confirm Attendance</button>
<button onclick="confirm(false)">Decline</button>
`);
}

/* ✅ Firebase CONFIG (REPLACE THESE) */
const firebaseConfig={
apiKey:"YOUR_API_KEY",
databaseURL:"YOUR_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* CONFIRM */
function confirm(status){

db.ref("agents/"+agentName).set({
name:agentName,
codename:codename,
role:role,
status:status?"Attending":"Declined",
timestamp:Date.now()
});

render(`
<h2 style="color:${status?'#00ff9f':'#ff4d4d'};">
${status?"✔ Attendance Confirmed":"✖ Mission Declined"}
</h2>
<button onclick="dashboard()">View Agent Dashboard</button>
`);
}

/* DASHBOARD */
function dashboard(){
render(`<h3>🛰 LIVE AGENTS</h3><div id="list"></div>`);

db.ref("agents").on("value",snap=>{
let data=snap.val();
let list=document.getElementById('list');
list.innerHTML="";

for(let k in data){
let a=data[k];
list.innerHTML+=`
<p>${a.name} (${a.codename}) — 
<span style="color:${a.status==="Attending"?'#00ff9f':'#ff4d4d'}">
${a.status}
</span></p>`;
}
});
}

start();
</script>
</body>
</html>
