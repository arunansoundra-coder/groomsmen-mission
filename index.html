<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Terminal</title>
<style>
body {
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
  overflow-x:hidden;
}

.container {
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:12px;
  text-align:center;
  min-height:400px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 30px #0ff;
}

button {
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  background:#66fcf1;
  color:#1f2833;
  box-shadow:0 0 8px #66fcf1;
}

.timer {
  margin-top:15px;
  font-weight:bold;
  color:#ffd700;
  text-shadow:0 0 6px #ffd700;
  font-size:1.1rem;
}

.success {
  color:#00ff9f;
  margin-top:10px;
  text-shadow:0 0 4px #00ff9f;
}

.table-wrapper {
  position:relative;
  width:300px;
  height:188px;
  margin:20px auto 20px auto;
  perspective:600px;
}

.table {
  width:100%;
  height:100%;
  border-radius:50% / 50%;
  background:#006400;
  border:3px solid #45a29e;
  transition: transform 1s ease-in-out;
}

.table-wrapper:hover .table {
  transform:rotateY(10deg) rotateX(5deg);
}

.player-name {
  position:absolute;
  font-size:0.65rem;
  transform:translate(-50%,-50%);
  white-space:nowrap;
  opacity:0;
  animation:fadeIn 1s ease forwards;
}

.chip {
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  box-shadow:0 0 4px black;
  transition:0.5s;
}

.chip:nth-child(even){ animation: glow 1.5s infinite alternate; }

@keyframes glow {
  from{ box-shadow:0 0 4px #fff; }
  to{ box-shadow:0 0 12px #ffd700; }
}

@keyframes fadeIn {
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.typewriter {
  display:inline-block;
  overflow:hidden;
  border-right:.1em solid #66fcf1;
  white-space:nowrap;
  letter-spacing:.05em;
  animation: typing 2s steps(40, end), blink 0.7s step-end infinite;
}

@keyframes typing {
  from{ width:0; }
  to{ width:100%; }
}

@keyframes blink {
  from, to{ border-color:transparent; }
  50%{ border-color:#66fcf1; }
}

@media (max-width:600px) {
  .table-wrapper { transform:scale(0.75); transform-origin:top center; }
}

</style>
</head>
<body>
<div class="container">
  <h1 id="title">MI6 Secure Terminal</h1>
  <div id="app"></div>
</div>

<script>
const app=document.getElementById('app');
const urlParams=new URLSearchParams(window.location.search);
const agentName=urlParams.get('agent')||'Agent';
const codenames={ "Arunan":"Alpha","Jason":"Viper","Gill":"Architect","Prathap":"Midnight","Taylor":"Shadow","Duran":"Anomaly","Josh":"Mirage" };
const roles={ "Arunan":"Best Man","Prathap":"Groomsman","Gill":"Groomsman","Taylor":"Groomsman","Duran":"Groomsman","Josh":"Groomsman","Jason":"Groomsman" };
const role=roles[agentName]||"Groomsman";
const codename=codenames[agentName]||"Agent";

const innerCircle=[
  {level:1,q:"How many times has Arunan gone to Sri Lanka?",options:["0","1","2","3"],answer:"1"},
  {level:2,q:"How many times has Arunan gone to Ireland?",options:["0","1","2","3"],answer:"1"},
  {level:3,q:"How many times has Arunan gone to Mexico?",options:["0","1","2","3"],answer:"2"},
  {level:4,q:"Las Vegas is a high-stakes location, but how many missions has Agent Arunan completed there?",options:["0","1","2","3"],answer:"1"}
];

const globalCode="007";
let timerInterval,timeLeft=15;
const clickSound=new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
const successSound=new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');

function playClick(){ clickSound.play(); }
function playSuccess(){ successSound.play(); }

let titleClicks=0;
document.getElementById("title").onclick=()=>{
  titleClicks++;
  if(titleClicks===5) typewriterAlert("Easter Egg Unlocked: Drinks on Arunan 🍸");
};

function typewriterAlert(msg){
  alert(msg); // can upgrade to typewriter in DOM later
}

function render(html){ app.innerHTML=html; app.classList.add('fade-in'); }

function start(){
  render(`<p class="typewriter">Agent ${agentName} – Codename: ${codename}, proceed with authentication...</p>
  <button onclick="authCode()">Begin Authentication</button>`);
}

function authCode(){
  playClick();
  render(`<p class="typewriter">Enter Global Access Code:</p>
          <input id="code" maxlength="3">
          <button onclick="checkCode()">Submit</button>
          <div id="err"></div>`);
}

function checkCode(){
  const val=document.getElementById('code').value;
  if(val===globalCode){ playSuccess(); nextInnerCircle(0); }
  else { document.getElementById('err').innerText="Access Denied"; playClick(); }
}

function nextInnerCircle(index){
  if(index>=innerCircle.length) return mission();
  let q=innerCircle[index];
  timeLeft=15;
  render(`<p class="typewriter">Level ${q.level} Clearance</p>
          <p class="typewriter">${q.q}</p>
          ${q.options.map(o=>`<button onclick="checkAnswer('${o}',${index})">${o}</button>`).join('')}
          <div id="timer" class="timer"></div>
          <div id="err"></div>`);
  startQuestionTimer(index);
}

function startQuestionTimer(index){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    document.getElementById('timer').innerText=`Time left: ${timeLeft}s`;
    timeLeft--;
    if(timeLeft<0){ clearInterval(timerInterval); document.getElementById('err').innerText="Time Expired! Retry."; setTimeout(()=>nextInnerCircle(index),1000);}
  },1000);
}

function checkAnswer(answer,index){
  playClick();
  clearInterval(timerInterval);
  if(answer===innerCircle[index].answer){ playSuccess(); nextInnerCircle(index+1);}
  else { document.getElementById('err').innerText="Access Denied"; setTimeout(()=>nextInnerCircle(index),1000);}
}

function mission(){
  render(`<h2 class="typewriter" style="color:#ffd700;">Operation Forever</h2>
          <p class="typewriter">Agent ${agentName} – Codename: ${codename}</p>
          <p class="typewriter">Will you assist as ${role}?</p>
          <button onclick="eventScreen()">Accept Mission</button>`);
}

// Combined Mission + Safehouse with MI6 feel
function eventScreen(){
  const w=300,h=188,cx=w/2,cy=h/2;
  render(`<p class="typewriter">Mission Accepted</p>
          <p class="typewriter">The mission begins September 18, 2026 at 12:00 PM</p>
          <div class="table-wrapper" id="table"><div class="table"></div></div>
          <div class="timer" id="timer"></div>
          <div id="safehouse" style="margin-top:20px; display:none;"></div>
          <button id="continueBtn">Continue</button>`);
  startCountdown();

  const container=document.getElementById('table');
  const players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];
  players.forEach((p,i)=>{
    const angle=(i/players.length)*2*Math.PI-Math.PI/2;
    const px=cx+(w/2+30)*Math.cos(angle);
    const py=cy+(h/2+30)*Math.sin(angle);
    const name=document.createElement('div');
    name.className='player-name';
    name.innerText=p;
    name.style.left=px+"px";
    name.style.top=py+"px";
    container.appendChild(name);
    for(let c=0;c<3;c++){
      const chip=document.createElement('div');
      chip.className='chip';
      chip.style.background=c%2===0?'#ff4d4d':'#ffd700';
      chip.style.left=(px+10)+'px';
      chip.style.top=(py-c*3+10)+'px';
      container.appendChild(chip);
    }
  });

  document.getElementById('continueBtn').onclick=showSafehouse;
}

function startCountdown(){
  const target=new Date('September 18, 2026 12:00:00').getTime();
  setInterval(()=>{
    const now=new Date().getTime();
    const diff=target-now;
    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m=Math.floor((diff%(1000*60*60))/(1000*60));
    const s=Math.floor((diff%(1000*60))/1000);
    document.getElementById('timer').innerText=`Countdown: ${d}d ${h}h ${m}m ${s}s`;
  },1000);
}

function showSafehouse(){
  const sh=document.getElementById('safehouse');
  sh.style.display='block';
  sh.innerHTML = `
    <h1 class="typewriter" style="color:#ffd700;">MISSION COMPLETE</h1>
    <p class="typewriter">Agent ${agentName}, your presence has been confirmed.</p>
    <p class="typewriter">Await further instructions for apparel.</p>
    <p class="typewriter">Safe house: 6233 Muirfield Dr SW Cedar Rapids, IA</p>
    <p class="typewriter">Confirm attendance:</p>
    <button onclick="notifyGroom()">Transmit Safe House Confirmation</button>
    <button onclick="emailGroom()">Send via Email</button>
    <button onclick="openForm()">Log Response (Backup)</button>
    <button onclick="declineSafehouse()">Not Staying</button>
    <div id="status" class="success"></div>
    <br><br>
    <button onclick="window.open('https://theknot.com/arunanandbrooke')">RSVP</button>
  `;
}

function notifyGroom(){ const msg=encodeURIComponent(`Agent ${agentName}: Staying at safe house.`); window.location.href=`sms:+14694262300?body=${msg}`; showStatus("✔ Transmission Sent"); }
function emailGroom(){ const subject=encodeURIComponent("Safe House Confirmation"); const body=encodeURIComponent(`Agent ${agentName} staying at safe house.`); window.location.href=`mailto:arunansoundra@gmail.com?subject=${subject}&body=${body}`; showStatus("✔ Email Prepared"); }
function openForm(){ const name=encodeURIComponent(agentName); const stay=encodeURIComponent("Yes"); const r=encodeURIComponent(role); window.open(`https://docs.google.com/forms/d/e/1FAIpQLSdBp0bzZtk-W-5jtPFT3uUjNoJrOG1C8HsVxbTgG5D5VSAY_w/viewform?usp=pp_url&entry.385675046=${name}&entry.1160902778=${stay}&entry.794497838=${r}`); }
function declineSafehouse(){ showStatus("✔ Logged: Not Staying"); }
function showStatus(msg){ document.getElementById('status').innerText=msg; }

start();
</script>
</body>
</html>
