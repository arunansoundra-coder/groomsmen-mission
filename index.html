<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Terminal</title>

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: #0b0c10;
  color: #66fcf1;
  display: flex;
  justify-content: center;
  padding-top: 20px;
  font-size: 14px;
}

.container {
  width: 95%;
  max-width: 800px;
  background: #1f2833;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  min-height: 500px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: #45a29e;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background: #66fcf1; color: #1f2833; }

.table-wrapper {
  position: relative;
  width: 500px;
  height: 300px;
  margin: 40px auto;
}
.table {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(#006400, #004d00);
  border: 4px solid #45a29e;
  box-shadow: 0 0 40px #45a29e inset, 0 0 20px #45a29e;
}

.player-name {
  position: absolute;
  transform: translate(-50%, -50%);
  font-size: 0.75rem;
}

.chip {
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
}

.tooltip {
  position: absolute;
  background: black;
  padding: 5px;
  font-size: 0.65rem;
  display: none;
}

.shake { animation: shake 0.4s; }
@keyframes shake {
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}

.fade { animation: fade 1s; }
@keyframes fade { from{opacity:0;} to{opacity:1;} }
</style>
</head>

<body>
<div class="container">
<h1 id="title">MI6 Secure Terminal</h1>
<div id="app"></div>
</div>

<script>
const app=document.getElementById("app");
const agent=new URLSearchParams(window.location.search).get("agent")||"Agent";

const codenameMap={
  "Arunan":["Ghost","Covert Infiltration Specialist"],
  "Jason":["Viper","Precision Strike Operative"],
  "Taylor":["Shadow","Surveillance"],
  "Gill":["Architect","Commander"],
  "Duran":["Anomaly","Wildcard"],
  "Josh":["Mirage","Deception"],
  "Prathap":["Midnight","Extraction"]
};

const [codename,desc]=codenameMap[agent]||["Agent","Specialist"];

const innerCircle=[
  {level:1,q:"What is Arunan's ethnicity?",options:["Sri Lankan","Indian","Filipino","Other"],answer:"Sri Lankan"},
  {level:2,q:"What is Arunan's nationality?",options:["United States","Canada","Sri Lanka","United Kingdom"],answer:"United States"},
  {level:3,q:"Arunan had a Black Rocky Mountain Horse. What was her name?",options:["Shadow","Maya","Midnight","Blaze"],answer:"Maya"},
  {level:4,q:"How many times has Arunan been to Vegas?",options:["0","1","2","Classified"],answer:"Classified"},
  {level:5,q:"Arunan owned a grey 2023 BMW 330i. What was his name?",options:["Storm","Cloud","Ghost","Silver"],answer:"Cloud"}
];

function render(html){
  app.innerHTML=html;
  app.classList.add("fade");
}

function start(){
  render(`<p>Agent ${agent} – ${codename}</p>
  <button onclick="auth()">Begin</button>`);
}

function auth(){
  render(`<input id="code"><button onclick="check()">Submit</button><div id="err"></div>`);
}

function check(){
  if(document.getElementById("code").value==="007"){
    nextQ(0);
  } else showError();
}

function showError(){
  let e=document.getElementById("err");
  e.innerText="Access Denied";
  e.classList.add("shake");
}

function nextQ(i){
  if(i===4){ finalClearance(); return;}
  if(i>=innerCircle.length){ mission(); return;}

  let q=innerCircle[i];
  render(`<p>Level ${q.level}</p><p>${q.q}</p>
  ${q.options.map(o=>`<button onclick="checkAns('${o}',${i})">${o}</button>`).join("")}
  <div id="err"></div>`);
}

function checkAns(a,i){
  if(i===3 && a==="Classified"){
    showError("ACCESS VERIFIED");
    setTimeout(()=>nextQ(i+1),1000);
    return;
  }
  if(a===innerCircle[i].answer){
    nextQ(i+1);
  } else showError();
}

function finalClearance(){
  render(`<h2>FINAL CLEARANCE</h2><div id="status"></div>`);
  setTimeout(()=>status.innerText="ACCESS GRANTED",1500);
  setTimeout(()=>status.innerText="INNER CIRCLE VERIFIED",3000);
  setTimeout(()=>nextQ(4),4500);
}

function mission(){
  render(`<p>MISSION ACCEPTED</p>
  <div class="table-wrapper" id="table"><div class="table"></div></div>
  <div id="timer"></div>`);

  let target=new Date("Sep 18 2026 12:00").getTime();
  setInterval(()=>{
    let diff=target-Date.now();
    if(diff<0){timer.innerText="Mission Started"; return;}
    let d=Math.floor(diff/86400000);
    let h=Math.floor(diff/3600000)%24;
    let m=Math.floor(diff/60000)%60;
    let s=Math.floor(diff/1000)%60;
    timer.innerText=`${d}d ${h}h ${m}m ${s}s`;
  },1000);

  let table=document.getElementById("table");
  let players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];
  players.forEach((p,i)=>{
    let angle=(i/players.length)*2*Math.PI;
    let x=250+200*Math.cos(angle);
    let y=150+120*Math.sin(angle);

    let el=document.createElement("div");
    el.className="player-name";
    el.style.left=x+"px";
    el.style.top=y+"px";
    el.innerText=p;
    table.appendChild(el);
  });
}

start();
</script>
</body>
</html>
