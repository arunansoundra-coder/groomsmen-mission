<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>

<style>
body { 
  margin:0; 
  font-family:'Courier New', monospace; 
  background:#0b0c10; 
  color:#66fcf1; 
  display:flex; 
  justify-content:center; 
  padding-top:20px;
}

.container { 
  width:95%; 
  max-width:700px; 
  background:#1f2833; 
  padding:20px; 
  border-radius:12px; 
  text-align:center; 
}

button { 
  width:100%; 
  padding:12px; 
  margin:8px 0; 
  background:#45a29e; 
  color:white; 
  border:none; 
  border-radius:8px; 
}

.timer { 
  margin-top:15px; 
  font-weight:bold; 
  color:#ffd700; 
}

/* TABLE */
.table-wrapper {
  position:relative;
  width:400px;
  height:250px;
  margin:20px auto;
}

.table {
  width:100%;
  height:100%;
  border-radius:50%/50%;
  background:#006400;
  border:3px solid #45a29e;
}

.card {
  position:absolute;
  width:30px;
  height:45px;
  background:white;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  transform:translate(-50%,-50%) rotateY(90deg);
  transition:0.6s;
}

/* MOBILE */
@media (max-width:600px){
  .table-wrapper {
    transform:scale(0.75);
    transform-origin:top center;
  }
  .card {
    width:22px;
    height:32px;
    font-size:0.6rem;
  }
}
</style>
</head>

<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<script>
const app=document.getElementById('app');
const urlParams=new URLSearchParams(window.location.search);
const agentName=urlParams.get('agent')||'Agent';

let players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];

const roles={
  "Arunan":"Best Man",
  "Prathap":"Groomsman",
  "Gill":"Groomsman",
  "Taylor":"Groomsman",
  "Duran":"Groomsman",
  "Josh":"Groomsman",
  "Jason":"Groomsman"
};

const role=roles[agentName]||"Groomsman";

function render(html){ app.innerHTML=html; }

/* START */
function start(){
  render(`<p>Agent, proceed with identity authentication...</p>
  <button onclick="q1()">Begin</button>`);
}

/* QUESTIONS */
function q1(){
  render(`<p>Level 1/3</p>
  <p>What poker hand did James Bond win with in Montenegro?</p>
  <button onclick="q2()">Straight Flush</button>
  <button onclick="wrong()">Royal Flush</button>
  <button onclick="wrong()">Full House</button>
  <div id="err"></div>`);
}

function q2(){
  render(`<p>Level 2/3</p>
  <p>What is James Bond's favorite drink?</p>
  <button onclick="q3()">Vodka Martini — Shaken, not stirred</button>
  <button onclick="wrong()">Scotch</button>
  <button onclick="wrong()">Old Fashioned</button>
  <button onclick="wrong()">Gin & Tonic</button>
  <div id="err"></div>`);
}

function q3(){
  render(`<p>Level 3/3</p>
  <p>Name all of James Bond's love interests.</p>
  <button onclick="welcome()">Vesper Lynd, Tracy Bond, Madeleine Swann</button>
  <button onclick="wrong()">Others</button>
  <div id="err"></div>`);
}

/* SECURITY */
function welcome(){
  render(`<h2>Welcome Agent ${agentName}</h2>
  <button onclick="sec1()">Proceed</button>`);
}

function sec1(){
  render(`<p>What was the name of Arunan's horse?</p>
  <button onclick="sec2()">Maya</button>
  <button onclick="wrong()">Luna</button>
  <button onclick="wrong()">Bella</button>
  <button onclick="wrong()">Shadow</button>
  <div id="err"></div>`);
}

function sec2(){
  render(`<p>Arunan previously owned a grey 2023 BMW 330i. What was his name?</p>
  <button onclick="sec3()">Cloud</button>
  <button onclick="wrong()">Phantom</button>
  <button onclick="wrong()">Frost</button>
  <button onclick="wrong()">Glacier</button>
  <div id="err"></div>`);
}

function sec3(){
  render(`<p><i>Blood makes us related, loyalty makes us family, and family is ____.</i></p>
  <input id="phrase">
  <button onclick="checkPhrase()">Submit</button>
  <div id="err"></div>`);
}

function checkPhrase(){
  const val=document.getElementById('phrase').value.toLowerCase();
  if(val.includes('forever')) mission(); else wrong();
}

/* MISSION */
function mission(){
  render(`<h2>Operation Forever</h2>
  <p>Agent ${agentName}, will you assist as ${role}?</p>
  <button onclick="eventScreen()">Accept Mission</button>`);
}

/* TABLE */
function eventScreen(){

  const w=400,h=250,cx=w/2,cy=h/2;

  render(`
    <h2>Mission Accepted</h2>
    <p>The mission begins September 18, 2026 at 12:00 PM</p>

    <div class="table-wrapper" id="table">
      <div class="table"></div>
    </div>

    <div class="timer" id="timer"></div>

    <button onclick="finalScreen()">Continue</button>
  `);

  startTimer();

  const container=document.getElementById('table');
  const deck=["A♠","K♥","Q♣","J♦","10♠","9♥","8♠","7♦"];

  let index=0;

  function createCard(val){
    const c=document.createElement('div');
    c.className='card';
    c.innerText=val;
    container.appendChild(c);
    return c;
  }

  // PLAYER CARDS
  players.forEach((p,i)=>{
    for(let j=0;j<2;j++){
      const angle=(i/players.length)*2*Math.PI-Math.PI/2;
      const x=cx+(w/2+30)*Math.cos(angle);
      const y=cy+(h/2+30)*Math.sin(angle);

      const card=createCard(deck[index++%deck.length]);

      setTimeout(()=>{
        if(p==="Arunan") card.style.boxShadow="0 0 10px gold";
        card.style.left=(x+j*10)+"px";
        card.style.top=(y+j*3)+"px";
        card.style.transform='translate(-50%,-50%) rotateY(0)';
      },i*400+j*200);
    }
  });

  // COMMUNITY CARDS
  ["A♠","K♥","Q♣","J♦","10♠"].forEach((v,i)=>{
    const c=createCard(v);
    setTimeout(()=>{
      c.style.left=(cx-60+i*30)+"px";
      c.style.top=cy+"px";
      c.style.transform='translate(-50%,-50%) rotateY(0)';
    },players.length*800+i*300);
  });
}

/* TIMER */
function startTimer(){
  const target=new Date('September 18, 2026 12:00:00').getTime();
  setInterval(()=>{
    const now=new Date().getTime();
    const diff=target-now;

    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m=Math.floor((diff%(1000*60*60))/(1000*60));
    const s=Math.floor((diff%(1000*60))/1000);

    document.getElementById('timer').innerText=
      `Countdown: ${d}d ${h}h ${m}m ${s}s`;
  },1000);
}

/* FINAL */
function finalScreen(){
  render(`<p>Await further instructions.</p>
  <p>Safe house: 6233 Muirfield Dr SW Cedar Rapids, IA</p>
  <button onclick="window.open('https://theknot.com/arunanandbrooke')">RSVP</button>`);
}

function wrong(){
  document.getElementById('err').innerText="Access Denied";
}

start();
</script>
</body>
</html>
