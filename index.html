<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MI6 Secure Channel</title>

<!-- 📱 Mobile App Feel -->
<meta name="theme-color" content="#0b0c10">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
  overscroll-behavior:none;
}

.container{
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

button{
  width:100%;
  padding:14px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
}

button:active{
  transform:scale(0.97);
}

/* 🎬 Screen Animation */
.screen{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🃏 Poker Table */
.table-wrapper{
  position:relative;
  width:300px;
  height:188px;
  margin:30px auto;
}

.table{
  width:100%;
  height:100%;
  border-radius:50%/50%;
  background:radial-gradient(circle,#0a5f2f,#004d26);
  border:3px solid #45a29e;
}

.card{
  position:absolute;
  width:32px;
  height:46px;
  background:white;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translate(-50%,-50%) rotateY(90deg);
  transition:0.6s;
}

.player-name{
  position:absolute;
  font-size:0.65rem;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<!-- 🔊 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const app=document.getElementById('app');
const agentName=new URLSearchParams(window.location.search).get('agent')||'Agent';

const codenames={
"Arunan":"Alpha","Jason":"Viper","Gill":"Architect",
"Prathap":"Midnight","Taylor":"Shadow","Duran":"Anomaly","Josh":"Mirage"
};

const roles={
"Arunan":"Best Man",
"Prathap":"Groomsman","Gill":"Groomsman",
"Taylor":"Groomsman","Duran":"Groomsman",
"Josh":"Groomsman","Jason":"Groomsman"
};

const codename=codenames[agentName]||"Agent";
const role=roles[agentName]||"Groomsman";

/* 🔊 AUDIO */
const casinoAudio=new Audio('https://assets.mixkit.co/sfx/preview/mixkit-casino-ambience-2093.mp3');
casinoAudio.loop=true;
casinoAudio.volume=0.3;

/* 📱 HAPTICS */
function haptic(){ if(navigator.vibrate) navigator.vibrate(10); }

/* 🔥 RENDER */
function render(html){ app.innerHTML=`<div class="screen">${html}</div>`; }

/* 🧠 QUESTIONS */
const innerCircle=[
{level:1,q:"Where did it all begin?",options:["Cedar Rapids","Chicago","Omaha"],answer:"Cedar Rapids"},
{level:2,q:"Mission date?",options:["Sept 18","Sept 19"],answer:"Sept 18"},
{level:3,q:"Follow up event?",options:["Homecoming Celebration","After Party"],answer:"Homecoming Celebration"},
{level:4,q:"Lodging codename?",options:["Safe House","Base"],answer:"Safe House"},
{level:5,q:"Family is ____",options:["Forever","Strong"],answer:"Forever"}
];

let qIndex=0;

/* START */
function start(){
render(`<p>Agent ${agentName} (${codename})</p>
<button onclick="startQ()">Begin Mission</button>`);
}

function startQ(){ showQ(); }

function showQ(){
const q=innerCircle[qIndex];
render(`<h3>LEVEL ${q.level}</h3><p>${q.q}</p>
${q.options.map(o=>`<button onclick="check('${o}')">${o}</button>`).join('')}
<div id="fb"></div>`);
}

function check(ans){
haptic();
const q=innerCircle[qIndex];
if(ans===q.answer){
qIndex++;
if(qIndex<innerCircle.length) setTimeout(showQ,500);
else setTimeout(accessGranted,700);
}else document.getElementById('fb').innerText="Incorrect";
}

/* 🎬 GLITCH */
function accessGranted(){
render(`<h1 id="g">ACCESS GRANTED</h1>`);
let g=document.getElementById('g'),c=0;
let fx=setInterval(()=>{
g.style.opacity=Math.random();
g.style.transform=`translate(${Math.random()*5}px,${Math.random()*5}px)`;
if(++c>10){clearInterval(fx); terminal();}
},80);
}

/* 🖥 TERMINAL */
function terminal(){
render(`
<h3>OPERATION: FOREVER</h3>
<p>${agentName} (${codename})</p>
<h2>${role}</h2>
<button onclick="accept()">🥃 Pour the whiskey</button>
<button onclick="accept()">🍸 Shaken, not stirred</button>
`);
}

/* ACCEPT */
function accept(){
haptic();
casinoAudio.play().catch(()=>{});
poker();
}

/* 🃏 POKER */
function poker(){
const players=["Arunan","Prathap","Gill","Taylor","Duran","Josh","Jason"];
render(`
<h3>MISSION START</h3>
<p>${agentName} (${codename}) - ${role}</p>
<h2>12:00 PM • Sept 18 2026</h2>

<div class="table-wrapper" id="table"><div class="table"></div></div>

<button onclick="safe()">Safe House Intel</button>
`);

const table=document.getElementById('table');
const cx=150,cy=94;

players.forEach((p,i)=>{
let angle=i*(2*Math.PI/players.length);
let x=cx+120*Math.cos(angle);
let y=cy+70*Math.sin(angle);

let name=document.createElement('div');
name.className='player-name';
name.innerText=p===agentName?`${p} (YOU)`:p;
name.style.left=x+"px";
name.style.top=y+"px";
table.appendChild(name);
});
}

/* 📍 SAFE HOUSE */
function safe(){
render(`
<h3>SAFE HOUSE</h3>
<p>6233 Muirfield Dr SW<br>Cedar Rapids, IA</p>
<button onclick="confirm(true)">Confirm</button>
<button onclick="confirm(false)">Decline</button>
`);
}

/* 🔥 FIREBASE CONFIG (PUT YOURS) */
const firebaseConfig={
apiKey:"YOUR_API_KEY",
databaseURL:"YOUR_DB_URL"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* 📡 CONFIRM */
function confirm(status){
db.ref("agents/"+agentName).set({
name:agentName,
codename:codename,
role:role,
status:status?"Attending":"Declined"
});

render(`
<h2>${status?"✔ Confirmed":"✖ Declined"}</h2>
<button onclick="dashboard()">View Dashboard</button>
`);
}

/* 🛰 DASHBOARD */
function dashboard(){
render(`<h3>LIVE AGENTS</h3><div id="list"></div>`);

db.ref("agents").on("value",snap=>{
let data=snap.val();
let list=document.getElementById('list');
list.innerHTML="";
for(let k in data){
let a=data[k];
list.innerHTML+=`<p>${a.name} (${a.codename}) - ${a.status}</p>`;
}
});
}

start();
</script>
</body>
</html>
