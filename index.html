<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>
<style>
body { margin:0; font-family: 'Courier New', monospace; background:#0b0c10; color:#66fcf1; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { width:95%; max-width:650px; background:#1f2833; padding:20px; border-radius:12px; text-align:center; box-shadow:0 0 20px rgba(0,255,200,0.2); }
h1 { font-size:1.5rem; margin-bottom:10px; }
button { width:100%; padding:14px; margin:8px 0; font-size:1rem; border:none; border-radius:8px; background:#45a29e; color:white; cursor:pointer; }
button:hover { opacity:0.9; }
input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; }
.timer { font-size:1.2rem; margin-top:15px; }
.progress { font-size:0.9rem; margin-bottom:10px; color:#c5c6c7; }
.error { color:#ff4d4d; margin-top:10px; }
@media (max-width:600px){ h1{font-size:1.2rem;} }
</style>
</head>
<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<script>
const app = document.getElementById('app');
const urlParams = new URLSearchParams(window.location.search);
const agentName = urlParams.get('agent') || 'Agent';

const roles = {
  "Jason":"Best Man",
  "Prathap":"Groomsman",
  "Gill":"Groomsman",
  "Taylor":"Groomsman",
  "Duran":"Groomsman",
  "Josh":"Groomsman"
};

const role = roles[agentName] || "Groomsman";

function render(html){ app.innerHTML = html; }

function typeText(text, callback){
  let i = 0;
  const speed = 25;
  app.innerHTML = "";
  const el = document.createElement("div");
  app.appendChild(el);
  function typing(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if(callback){ callback(); }
  }
  typing();
}

function start(){
  typeText("Agent, proceed with identity authentication...", () => {
    setTimeout(()=>{
      render(`<button onclick="q1()">Begin</button>`);
    },500);
  });
}

function q1(){
render(`
<div class="progress">Level 1/3</div>
<p>What poker hand did James Bond win with in Montenegro?</p>
<button onclick="q2()">Straight Flush</button>
<button onclick="wrong()">Royal Flush</button>
<button onclick="wrong()">Full House</button>
<div class="error" id="err"></div>
`);
}

function q2(){
render(`
<div class="progress">Level 2/3</div>
<p>What is James Bond's favorite drink?</p>
<button onclick="q3()">Vodka Martini — Shaken, not stirred</button>
<button onclick="wrong()">Scotch Neat</button>
<button onclick="wrong()">Old Fashioned</button>
<button onclick="wrong()">Gin and Tonic</button>
<div class="error" id="err"></div>
`);
}

function q3(){
render(`
<div class="progress">Level 3/3</div>
<p>Name all of James Bond's love interests.</p>
<button onclick="welcome()">Vesper Lynd, Tracy Bond, Madeleine Swann</button>
<button onclick="wrong()">Domino, Tiffany Case, Natalya Simonova</button>
<button onclick="wrong()">Honey Ryder, Kissy Suzuki, Wai Lin</button>
<button onclick="wrong()">Solitaire, Natalya Simonova, Camille Montes</button>
<div class="error" id="err"></div>
`);
}

function welcome(){
render(`
<h2>Welcome Agent ${agentName}</h2>
<button onclick="sec1()">Proceed to Security Clearance</button>
`);
}

function sec1(){
render(`
<p>Agent ${agentName}, confirm security clearance.</p>
<p>What was the name of the horse?</p>
<button onclick="sec2()">Maya</button>
<button onclick="wrong()">Luna</button>
<button onclick="wrong()">Bella</button>
<button onclick="wrong()">Shadow</button>
<div class="error" id="err"></div>
`);
}

function sec2(){
render(`
<p>What was the BMW's name?</p>
<button onclick="sec3()">Cloud</button>
<button onclick="wrong()">Frost</button>
<button onclick="wrong()">Phantom</button>
<button onclick="wrong()">Glacier</button>
<div class="error" id="err"></div>
`);
}

function sec3(){
render(`
<p>Complete the phrase:</p>
<p><i>Blood makes us related, loyalty makes us family, and family is ____.</i></p>
<input id="phrase" placeholder="Enter answer" />
<button onclick="checkPhrase()">Submit</button>
<div class="error" id="err"></div>
`);
}

function checkPhrase(){
const val = document.getElementById('phrase').value.toLowerCase();
if(val.includes('forever')) mission(); else showError();
}

function mission(){
render(`
<h2>Operation Forever</h2>
<p>Agent ${agentName}, will you assist the groom as ${role}?</p>
<button onclick="eventScreen()">Pour the whiskey.</button>
<button onclick="eventScreen()">For King and Country.</button>
<button onclick="eventScreen()">Sounds like a job for 007.</button>
<button onclick="eventScreen()">The name's Bond… Let's do it!</button>
`);
}

function eventScreen(){
const players = ["Jason","Prathap","Gill","Taylor","Duran","Josh","Groom"];

const seats = players.map(p => {
  const highlight = p.toLowerCase() === agentName.toLowerCase() ? "style='color:#ffd700; font-weight:bold;'" : "";
  return `<span ${highlight}>${p}${p==="Jason"?" (Best Man)":""}</span>`;
}).join(" • ");

render(`
<h2>Mission Accepted</h2>
<p>The mission will begin at noon on September 18, 2026.</p>
<p>High Stakes Poker Game<br>Objective: Defeat the Groom<br>Prize: MI6 Poker Champion</p>

<div style="margin-top:15px; position:relative;">
  <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop" 
       alt="Poker Table" 
       style="width:100%; border-radius:12px;" />

  <div style="position:absolute; top:10%; left:50%; transform:translateX(-50%); font-size:0.8rem;">${players[0]}</div>
  <div style="position:absolute; top:30%; left:10%; font-size:0.8rem;">${players[1]}</div>
  <div style="position:absolute; top:70%; left:10%; font-size:0.8rem;">${players[2]}</div>
  <div style="position:absolute; bottom:10%; left:50%; transform:translateX(-50%); font-size:0.8rem;">${players[3]}</div>
  <div style="position:absolute; top:70%; right:10%; font-size:0.8rem;">${players[4]}</div>
  <div style="position:absolute; top:30%; right:10%; font-size:0.8rem;">${players[5]}</div>
  <div style="position:absolute; top:5%; left:5%; font-size:0.8rem;">${players[6]}</div>
</div>

<div style="margin-top:10px; font-size:0.9rem; line-height:1.6;">
  <p><strong>Table Seating:</strong></p>
  <p>${seats}</p>
</div>

<div class="timer" id="timer"></div>
<button onclick="finalScreen()">Continue</button>
`);
startTimer();
}

function startTimer(){
const target = new Date('September 18, 2026 12:00:00').getTime();
setInterval(()=>{
const now = new Date().getTime();
const diff = target - now;
const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);
document.getElementById('timer').innerText = `${d}d ${h}h ${m}m ${s}s`;
},1000);
}

function finalScreen(){
render(`
<p>Await further instructions regarding apparel.</p>
<p>Safe house: 6233 Muirfield Dr SW Cedar Rapids, IA</p>
<p>Beds are available.</p>
<button onclick="window.open('https://theknot.com/arunanandbrooke')">RSVP</button>
`);
}

function showError(){
const err = document.getElementById('err');
if(err) err.innerText = "Access Denied. Try again.";
}

function wrong(){ showError(); }

start();
</script>
</body>
</html>
