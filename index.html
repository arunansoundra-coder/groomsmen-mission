<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Wedding Mission</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  text-align:center;
}

/* Mission Brief */
#missionBrief{
  margin:15px auto 10px;
  font-size:16px;
  max-width:800px;
  color:#c5c6c7;
}

/* Background glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,255,150,0.08), transparent 70%);
  pointer-events:none;
}

/* Poker Table */
#pokerTable{
  margin:20px auto;
  width:650px;
  height:650px;
  border-radius:50%;
  position:relative;

  background:
    radial-gradient(circle at center, #1b5e20 0%, #0b3d1c 70%, #072a14 100%);

  border:10px solid #3e2723;

  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.9),
    inset 0 0 80px rgba(0,0,0,0.6),
    0 20px 40px rgba(0,0,0,0.8);
}

/* Felt texture */
#pokerTable::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background-image:
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
  opacity:0.15;
}

/* Chips */
.chip{
  position:absolute;
  width:28px;
  height:28px;
  border-radius:50%;

  background: radial-gradient(circle at 30% 30%, #b2ff59, #2e7d32);

  border:2px solid rgba(255,255,255,0.4);

  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.4),
    inset 0 -3px 5px rgba(0,0,0,0.5),
    0 2px 4px rgba(0,0,0,0.6);
}

/* Agents */
.agent{
  position:absolute;
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;

  background:rgba(0,0,0,0.6);
  border:2px solid #66fcf1;

  box-shadow:
    inset 0 0 10px rgba(102,252,241,0.3),
    0 0 15px rgba(102,252,241,0.2);

  transition:0.3s;
}

.agent:hover{
  background:#66fcf1;
  color:#0b0c10;
}

.confirmed{
  background:#45a29e;
  color:#0b0c10;
}

/* Overlay */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#terminal{
  width:90%;
  max-width:900px;
  height:80%;
  border:2px solid #66fcf1;
  border-radius:10px;
  padding:20px;
}

/* Decision UI */
#decisionStage{
  display:block;
}

#questionText{
  font-size:20px;
  margin-bottom:20px;
}

#decisionStage button{
  display:block;
  width:220px;
  margin:12px auto;
  padding:12px;
  font-size:16px;
  background:#1f2833;
  border:2px solid #66fcf1;
  color:#66fcf1;
  cursor:pointer;
}

#confirmBtn{
  border-color:#66fcf1;
}

#declineBtn{
  border-color:#ff4c4c;
  color:#ff4c4c;
}

#confirmation{
  display:none;
  font-size:28px;
  color:#45a29e;
}

#allDone{
  display:none;
  font-size:32px;
  color:#66fcf1;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="missionBrief">
MISSION OBJECTIVE: Complete all agent clearances. Each operative must confirm their participation before the table is revealed.
</div>

<div id="pokerTable"></div>
<div id="allDone">🎉 ALL AGENTS ACCOUNTED FOR 🎉</div>

<div id="overlay">
  <div id="terminal">
    <div id="decisionStage">
      <p id="questionText"></p>
      <button id="confirmBtn">ACCEPT MISSION</button>
      <button id="declineBtn">DECLINE</button>
    </div>
  </div>
  <div id="confirmation">MISSION CONFIRMED</div>
</div>

<script>
const agents = {
  viper: { name: "Viper", role: "Best Man" },
  shadow: { name: "Shadow", role: "Groomsman" },
  architect: { name: "Architect", role: "Groomsman" },
  anomaly: { name: "Anomaly", role: "Groomsman" },
  mirage: { name: "Mirage", role: "Groomsman" },
  midnight: { name: "Midnight", role: "Groomsman" }
};

let currentAgentKey = null;

const table = document.getElementById("pokerTable");
const overlay = document.getElementById("overlay");
const questionText = document.getElementById("questionText");

const positions = [
  [275,30],[500,180],[500,420],
  [275,540],[50,420],[50,180]
];

/* Create Chips */
function createChips(){
  for(let i=0;i<25;i++){
    const chip=document.createElement("div");
    chip.className="chip";
    chip.style.left=Math.random()*620+"px";
    chip.style.top=Math.random()*620+"px";
    table.appendChild(chip);
  }
}

/* Decision UI */
function loadDecision(){
  document.getElementById("confirmation").style.display="none";
  questionText.innerText = "AUTHORIZATION REQUIRED: Accept your role in this operation?";
  overlay.style.display="flex";
}

/* Confirm */
document.getElementById("confirmBtn").onclick = () => {
  missionComplete();
};

/* Decline */
document.getElementById("declineBtn").onclick = () => {
  alert("ACCESS DENIED: Participation required to proceed.");
};

/* Mission Complete */
function missionComplete(){
  localStorage.setItem(currentAgentKey,"confirmed");

  document.querySelector(`[data-agent='${currentAgentKey}']`)
    .classList.add("confirmed");

  overlay.style.display="none";

  // Reveal poker table after each agent completes
  document.getElementById("pokerTable").style.display = "block";

  checkAllComplete();
}

/* Check Completion */
function checkAllComplete(){
  const allDone = Object.keys(agents).every(a => localStorage.getItem(a)==="confirmed");
  if(allDone){
    document.getElementById("allDone").style.display = "block";
  }
}

/* Build agents */
Object.keys(agents).forEach((key,i)=>{
  const agent = agents[key];

  const div = document.createElement("div");
  div.className="agent";
  div.innerText=agent.name;
  div.dataset.agent=key;

  div.style.left=positions[i][0]+"px";
  div.style.top=positions[i][1]+"px";

  if(localStorage.getItem(key)==="confirmed"){
    div.classList.add("confirmed");
  }

  div.onclick=()=>{
    currentAgentKey=key;
    loadDecision();
  };

  table.appendChild(div);
});

/* Init */
table.style.display="none";
createChips();
</script>

</body>
</html>
