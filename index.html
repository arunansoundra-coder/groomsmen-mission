<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
}

.container{
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.table-wrapper{
  position:relative;
  width:300px;
  height:188px;
  margin:40px auto 20px auto;
}

.table{
  width:100%;
  height:100%;
  border-radius:50%/50%;
  background:radial-gradient(circle, #0a5f2f, #004d26);
  border:3px solid #45a29e;
}

.card{
  position:absolute;
  width:32px;
  height:46px;
  background:white;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.7rem;
  transform:translate(-50%,-50%) rotateY(90deg);
  transition:0.6s;
}

.player-name{
  position:absolute;
  font-size:0.65rem;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<script>
const app=document.getElementById('app');
const agentName=new URLSearchParams(window.location.search).get('agent')||'Agent';

const codenames={
  "Arunan":"Alpha","Jason":"Viper","Gill":"Architect",
  "Prathap":"Midnight","Taylor":"Shadow","Duran":"Anomaly","Josh":"Mirage"
};

const roles={
  "Arunan":"Best Man",
  "Prathap":"Groomsman","Gill":"Groomsman",
  "Taylor":"Groomsman","Duran":"Groomsman",
  "Josh":"Groomsman","Jason":"Groomsman"
};

const codename=codenames[agentName]||"Agent";
const role=roles[agentName]||"Groomsman";

/* QUESTIONS */
const innerCircle=[
{level:1,q:"MISSION BRIEF: The operation begins in a city where two paths became one. Identify the location.",options:["Cedar Rapids","Chicago","Des Moines","Omaha"],answer:"Cedar Rapids"},
{level:2,q:"INTEL REPORT: Confirm the operation date.",options:["September 18, 2026","September 19, 2026","October 1, 2026","August 30, 2026"],answer:"September 18, 2026"},
{level:3,q:"SURVEILLANCE LOG: Identify the follow-up celebration event.",options:["Homecoming Celebration","Rehearsal Dinner","After Party","Brunch"],answer:"Homecoming Celebration"},
{level:4,q:"CLASSIFIED MOVEMENT: What is the lodging location called?",options:["Headquarters","Safe House","Command Center","Base Camp"],answer:"Safe House"},
{level:5,q:"FINAL CLEARANCE: Blood makes us related, loyalty makes a family, and family is ______.",options:["Forever","Strong","Unbreakable","Everything"],answer:"Forever"}
];

let currentQ=0;

function render(html){ app.innerHTML=html; }

/* START */
function start(){
  render(`<p>Agent ${agentName} – Codename: ${codename}</p>
  <button onclick="startQuestions()">Begin Mission</button>`);
}

/* QUESTIONS */
function startQuestions(){ showQuestion(); }

function showQuestion(){
  const q=innerCircle[currentQ];
  render(`<h3>LEVEL ${q.level}</h3><p>${q.q}</p>
    ${q.options.map(o=>`<button onclick="checkAnswer('${o}')">${o}</button>`).join('')}
    <div id="feedback"></div>`);
}

function checkAnswer(selected){
  const q=innerCircle[currentQ];
  const fb=document.getElementById('feedback');

  if(selected===q.answer){
    fb.innerHTML="✓ Correct";
    currentQ++;

    if(currentQ<innerCircle.length){
      setTimeout(showQuestion,800);
    } else {
      fb.innerHTML="🎯 INNER CIRCLE VERIFIED";
      setTimeout(terminalIntro,1000);
    }
  } else {
    fb.innerHTML="✖ Incorrect. Try again.";
  }
}

/* TERMINAL INTRO */
function terminalIntro(){
  render(`
    <h3>CLASSIFIED // OPERATION: FOREVER</h3>
    <p>Agent ${agentName} (${codename})</p>
    <p>You are hereby assigned the role of:</p>
    <h2 style="color:#ffd700;">${role}</h2>
    <p>Do you accept this mission?</p>

    <button onclick="acceptMission()">🥃 Pour the whiskey</button>
    <button onclick="acceptMission()">🍸 Shaken, not stirred</button>
    <button onclick="acceptMission()">🎯 Mission accepted</button>
  `);
}

/* ACCEPT → POKER */
function acceptMission(){
  eventScreen();
}

/* POKER SCREEN */
function eventScreen(){
  render(`
    <h3 style="color:#ffd700;">MISSION BRIEFING</h3>
    <p>Agent ${agentName} (${codename})</p>
    <p>Role: ${role}</p>

    <p>Mission begins at:</p>
    <h2>12:00 PM — September 18, 2026</h2>
    <p>Location: High Stakes Poker Table</p>
    <p>Objective: Beat the Groom</p>

    <div class="table-wrapper" id="table">
      <div class="table"></div>
    </div>

    <button onclick="safeHouse()">Proceed to Safe House Intel</button>
  `);

  dealCards();
}

function dealCards(){
  const container=document.getElementById('table');
  const cx=150,cy=94;
  const deck=["A♠","K♥","Q♣","J♦"];

  for(let i=0;i<4;i++){
    const card=document.createElement('div');
    card.className='card';
    card.innerText=deck[i];
    card.style.left=cx+"px";
    card.style.top=cy+"px";
    container.appendChild(card);

    setTimeout(()=>{
      card.style.left=(cx+Math.cos(i*1.5)*100)+"px";
      card.style.top=(cy+Math.sin(i*1.5)*60)+"px";
      card.style.transform="translate(-50%,-50%) rotateY(0deg)";
    },i*200);
  }
}

/* SAFE HOUSE */
function safeHouse(){
  render(`
    <h3>SAFE HOUSE LOCATION</h3>
    <p>6233 Muirfield Dr SW</p>
    <p>Cedar Rapids, IA</p>

    <p>Confirm your presence at the safe house during the mission.</p>

    <button onclick="confirm(true)">✅ Confirm Attendance</button>
    <button onclick="confirm(false)">❌ Decline</button>
  `);
}

function confirm(status){
  render(status
    ? "<h2 style='color:#00ff9f;'>✔ Attendance Confirmed</h2>"
    : "<h2 style='color:#ff4d4d;'>✖ Mission Declined</h2>"
  );
}

start();
</script>
</body>
</html>
