<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Wedding Mission</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  text-align:center;
}

h1{margin-top:30px;}

#pokerTable{
  margin:40px auto;
  width:600px;
  height:600px;
  border-radius:50%;
  background:radial-gradient(circle, #1f2833, #0b0c10);
  border:3px solid #66fcf1;
  position:relative;
}

.agent{
  position:absolute;
  width:100px;
  height:100px;
  border:2px solid #66fcf1;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
}

.agent:hover{
  background:#66fcf1;
  color:#0b0c10;
}

.confirmed{
  background:#45a29e;
  color:#0b0c10;
}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#terminal{
  width:90%;
  max-width:900px;
  height:80%;
  border:2px solid #66fcf1;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 20px #66fcf1;
  padding:20px;
}

#terminalHeader{
  background:#1f2833;
  padding:10px;
  text-align:left;
  margin-bottom:10px;
}

button{
  padding:10px 15px;
  margin:10px;
  background:#1f2833;
  border:1px solid #66fcf1;
  color:#66fcf1;
  cursor:pointer;
}

#formFrame{
  width:100%;
  height:100%;
  border:none;
  display:none;
}

#confirmation{
  display:none;
  font-size:28px;
  color:#45a29e;
}

#allDone{
  display:none;
  font-size:32px;
  color:#66fcf1;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>MI6 Agent Deployment Table</h1>
<div id="pokerTable"></div>
<div id="allDone">🎉 ALL AGENTS ACCOUNTED FOR 🎉</div>

<div id="overlay">
  <div id="terminal">
    <div id="terminalHeader">SECURITY CLEARANCE REQUIRED</div>

    <div id="securityStage">
      <p id="questionText"></p>
      <div id="options"></div>
    </div>

    <iframe id="formFrame"></iframe>
  </div>
  <div id="confirmation">MISSION CONFIRMED</div>
</div>

<script>
const agents = {
  viper: { name: "Viper", role: "Best Man" },
  shadow: { name: "Shadow", role: "Groomsman" },
  architect: { name: "Architect", role: "Groomsman" },
  anomaly: { name: "Anomaly", role: "Groomsman" },
  mirage: { name: "Mirage", role: "Groomsman" },
  midnight: { name: "Midnight", role: "Groomsman" }
};

// ORIGINAL QUESTIONS (UNCHANGED)
const innerCircle=[
{level:1,q:"MISSION BRIEF: The operation begins in a city where two paths became one. Identify the location.",options:["Cedar Rapids","Chicago","Des Moines","Omaha"],answer:"Cedar Rapids"},
{level:2,q:"INTEL REPORT: Confirm the operation date.",options:["September 18, 2026","September 19, 2026","October 1, 2026","August 30, 2026"],answer:"September 18, 2026"},
{level:3,q:"SURVEILLANCE LOG: Identify the follow-up celebration event.",options:["Homecoming Celebration","Rehearsal Dinner","After Party","Brunch"],answer:"Homecoming Celebration"},
{level:4,q:"CLASSIFIED MOVEMENT: What is the lodging location called?",options:["Headquarters","Safe House","Command Center","Base Camp"],answer:"Safe House"},
{level:5,q:"FINAL CLEARANCE: Blood makes us related, loyalty makes a family, and family is ______.",options:["Forever","Strong","Unbreakable","Everything"],answer:"Forever"}
];

let currentLevel = 0;
let currentAgentKey = null;

const formBase = "https://docs.google.com/forms/d/e/1FAIpQLSdBp0bzZtk-W-5jtPFT3uUjNoJrOG1C8HsVxbTgG5D5VSAY_w/viewform";

const table = document.getElementById("pokerTable");
const overlay = document.getElementById("overlay");
const frame = document.getElementById("formFrame");
const confirmation = document.getElementById("confirmation");
const questionText = document.getElementById("questionText");
const optionsDiv = document.getElementById("options");

const positions = [[250,20],[450,150],[450,350],[250,480],[50,350],[50,150]];

function loadQuestion(){
  const q = innerCircle[currentLevel];
  questionText.innerText = q.q;
  optionsDiv.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option;

    btn.onclick = () => {
      if(option === q.answer){
        currentLevel++;
        if(currentLevel >= innerCircle.length){
          startMission();
        } else {
          loadQuestion();
        }
      } else {
        alert("ACCESS DENIED");
      }
    };

    optionsDiv.appendChild(btn);
  });
}

function startMission(){
  const agent = agents[currentAgentKey];

  const url = `${formBase}?usp=pp_url&entry.385675046=${encodeURIComponent(agent.name)}&entry.794497838=${encodeURIComponent(agent.role)}&entry.1160902778=Yes`;

  frame.src = url;
  document.getElementById("securityStage").style.display = "none";
  frame.style.display = "block";

  setTimeout(() => {
    localStorage.setItem(currentAgentKey,"confirmed");
    document.querySelector(`[data-agent='${currentAgentKey}']`).classList.add("confirmed");

    document.getElementById("terminal").style.display = "none";
    confirmation.style.display = "block";

    checkAllComplete();
  }, 8000);
}

function checkAllComplete(){
  const allDone = Object.keys(agents).every(a => localStorage.getItem(a)==="confirmed");
  if(allDone){
    document.getElementById("allDone").style.display = "block";
  }
}

Object.keys(agents).forEach((key,i)=>{
  const agent = agents[key];

  const div = document.createElement("div");
  div.className="agent";
  div.innerText=agent.name;
  div.dataset.agent=key;
  div.style.left=positions[i][0]+"px";
  div.style.top=positions[i][1]+"px";

  if(localStorage.getItem(key)==="confirmed"){
    div.classList.add("confirmed");
  }

  div.onclick=()=>{
    currentAgentKey=key;
    currentLevel=0;
    overlay.style.display="flex";
    loadQuestion();
  };

  table.appendChild(div);
});
</script>

</body>
</html>
