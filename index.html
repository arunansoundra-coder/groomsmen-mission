<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Secure Channel</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#0b0c10;
  color:#66fcf1;
  display:flex;
  justify-content:center;
  padding-top:20px;
}

.container{
  width:95%;
  max-width:700px;
  background:#1f2833;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#45a29e;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.table-wrapper{
  position:relative;
  width:100%;
  max-width:320px;
  height:220px;
  margin:20px auto;
}

.table{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle,#0a5f2f,#004d26);
  border:3px solid #45a29e;
}

.player{
  position:absolute;
  font-size:0.6rem;
  text-align:center;
}

.card{
  position:absolute;
  width:32px;
  height:44px;
  background:white;
  border-radius:4px;
}
</style>
</head>

<body>
<div class="container">
<h1>MI6 Secure Channel</h1>
<div id="app"></div>
</div>

<script>
const app=document.getElementById("app");
const params=new URLSearchParams(window.location.search);
const agent=params.get("agent")||"Agent";

const roles={
  "Arunan":"Groom",
  "Jason":"Best Man",
  "Gill":"Groomsman",
  "Prathap":"Groomsman",
  "Taylor":"Groomsman",
  "Duran":"Groomsman",
  "Josh":"Groomsman"
};

const codenames={
  "Arunan":"Ghost",
  "Jason":"Viper",
  "Gill":"Architect",
  "Prathap":"Midnight",
  "Taylor":"Shadow",
  "Duran":"Anomaly",
  "Josh":"Mirage"
};

let currentQ=0;

const questions=[
{q:"City where paths became one?",a:"Cedar Rapids",options:["Cedar Rapids","Chicago","Des Moines","Omaha"]},
{q:"Operation date?",a:"September 18, 2026",options:["September 18, 2026","September 19, 2026"]},
{q:"Follow-up event?",a:"Homecoming Celebration",options:["Homecoming Celebration","After Party"]},
{q:"Lodging location?",a:"Safe House",options:["Safe House","Hotel"]},
{q:"Family is ______",a:"Forever",options:["Forever","Strong"]}
];

/* SOUND */
const sounds={
 deal:new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c8b0a2e9b.mp3"),
 chip:new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a0c6a6b2f.mp3"),
 dealer:new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_5d2c4c8a2b.mp3")
};
function play(s){sounds[s]?.play();}

/* FLOW */
function start(){
 app.innerHTML=`
  <p>${agent}</p>
  <button onclick="startQuestions()">Begin Mission</button>
 `;
}

function startQuestions(){ showQ(); }

function showQ(){
 let q=questions[currentQ];
 app.innerHTML=`
  <h3>${q.q}</h3>
  ${q.options.map(o=>`<button onclick="check('${o}')">${o}</button>`).join("")}
 `;
}

function check(ans){
 let q=questions[currentQ];
 if(ans===q.a){
  currentQ++;
  if(currentQ<questions.length) showQ();
  else mission();
 }
}

/* MISSION */
function mission(){
 let role=roles[agent]||"Groomsman";
 let codename=codenames[agent]||"Agent";

 app.innerHTML=`
  <h3>MISSION ACCEPTANCE</h3>
  <p>${agent} (${codename})</p>
  <h2>${role}</h2>

  <button onclick="accept()">🥃 Pour the whiskey</button>
  <button onclick="accept()">🍸 Shaken not stirred</button>
 `;
}

function accept(){
 poker();
}

/* POKER */
let players=["Jason","Gill","Prathap","Taylor","Duran","Josh","Arunan"];
let turn=0;
let pot=0;

function poker(){
 app.innerHTML=`
  <h3>Poker Table</h3>
  <p>Pot: ${pot}</p>

  <div class="table-wrapper" id="table">
   <div class="table"></div>
  </div>

  <button onclick="action('call')">Call</button>
  <button onclick="action('raise')">Raise</button>
  <button onclick="action('fold')">Fold</button>

  <button onclick="safeHouse()">Continue</button>
 `;
 renderPlayers();
}

function renderPlayers(){
 let table=document.getElementById("table");
 players.forEach((p,i)=>{
  let angle=(i/players.length)*Math.PI*2;
  let x=150+Math.cos(angle)*120;
  let y=100+Math.sin(angle)*80;

  let div=document.createElement("div");
  div.className="player";
  div.style.left=x+"px";
  div.style.top=y+"px";
  div.innerHTML=p;
  table.appendChild(div);
 });
}

function action(type){
 if(type==="raise"){pot+=10; play("chip");}
 turn=(turn+1)%players.length;
 poker();
}

/* SAFE HOUSE */
function safeHouse(){

 let role=roles[agent];

 if(role==="Groomsman" || role==="Best Man"){
  sendForm();
 }

 app.innerHTML=`
  <h3>Safe House</h3>
  <p>6233 Muirfield Dr SW</p>
  <button onclick="confirm()">Confirm Attendance</button>
 `;
}

function sendForm(){
 if(agent==="Arunan") return;

 let url="https://docs.google.com/forms/d/e/1FAIpQLSdBp0bzZtk-W-5jtPFT3uUjNoJrOG1C8HsVxbTgG5D5VSAY_w/formResponse";

 fetch(url,{
  method:"POST",
  mode:"no-cors",
  body:new URLSearchParams({
   "entry.385675046":agent,
   "entry.1160902778":"Yes",
   "entry.794497838":roles[agent]
  })
 });
}

function confirm(){
 app.innerHTML="<h2>✔ Confirmed</h2>";
}

start();
</script>
</body>
</html>
