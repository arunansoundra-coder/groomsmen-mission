<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 Mission – Groomsmen</title>
<link rel="stylesheet" href="groomsmen.css">
</head>
<body>

<!-- 007 Gun Barrel Intro -->
<section id="intro">
  <div class="gunbarrel">007</div>
  <h1>MI6 Secure Channel</h1>
  <h2>Agent Authentication Required</h2>
  <button onclick="startMission()">ENTER</button>
</section>

<!-- Terminal Output -->
<section id="terminal"></section>

<!-- Interactive Mission Items -->
<section id="puzzle" class="hidden">
  <h2>MISSION VERIFICATION</h2>
  <p>Drag the correct mission item into your dossier:</p>
  
  <div id="cards">
    <div class="card" draggable="true" data-item="rings">Wedding Rings</div>
    <div class="card" draggable="true" data-item="groom">Groom Arrival</div>
    <div class="card" draggable="true" data-item="celebration">Celebrate Operation FOREVER</div>
  </div>
  
  <div id="dropzone">DROP ITEMS HERE</div>
  <p id="result"></p>
</section>

<!-- Agent Dossier -->
<section id="mission" class="hidden">
  <h2 id="agentName">Agent</h2>
  <h3>MI6 ASSIGNMENT</h3>
  <ul id="missionList"></ul>
  <p class="final">Status: ACTIVE</p>
</section>

<script src="groomsmen.js"></script>
</body>
</html>
